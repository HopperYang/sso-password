server:
  port: 8080

sso:
  jwt:
    secret: ${SSO_JWT_SECRET:dev-only-change-me-use-long-random-string-for-production}
    issuer: sso-poc
    access-token-ttl-seconds: 3600
  api-key: ${SSO_API_KEY:poc-dev-api-key}
  password-session:
    ttl-minutes: 15
    redis-enabled: ${SSO_PASSWORD_SESSION_REDIS_ENABLED:false}
    redis-key-prefix: ${SSO_PASSWORD_SESSION_REDIS_KEY_PREFIX:sso:pwd-session:}

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      username: ${REDIS_USERNAME:}

  application:
    name: sso-server
